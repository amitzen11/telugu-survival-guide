site_name: Telugu Survival Guide
site_url: https://telugu.app # Placeholder
site_description: A survival Telugu guide for beginners navigating life in Hyderabad.
site_author: Agent
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/favicon.png
  favicon: assets/img/favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono

plugins:
  - search:
      lang: en
  - meta

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["docs"]

extra:
  generator: false

extra_css:
  - assets/css/custom.css?v=1.0.0

extra_javascript: 
  - assets/js/init.js
  - assets/js/header.js
  - assets/js/badges.js
  - assets/js/wotd.js

nav:
  - Home: index.md
  - My Profile: profile.md
  - Interactive:
      - Overview: games/index.md
      - Survival Game: games/auto_rickshaw.md
  - Supplementary:
      - Flashcards: flashcards/index.md
  - Lessons:
      - 1. Greetings & Etiquette: 01_history_and_nuances.md
      - 2. Survival & Clarity: 02_survival_and_emergencies.md
      - 3. Social & Small Talk: 03_social_interactions.md
      - 4. Numbers & Directions: 04_time_and_numbers.md
      - 5. Verbs & Grammar: 05_verbs_and_grammar.md
      - 6. Adjectives: 06_adjectives.md
      - 7. Slang & Hyderabad-isms: 07_slang.md
      - 8. Transport & Conflict: 08_travel_and_conflict.md
      - 9. Real Estate & Services: 09_everyday_logistics.md
      - 10. Household & Groceries: 10_household_and_logistics.md
